services:
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    container_name: news_scheduler
    depends_on:
      - redis
    command:
      [
        "celery",
        "-A",
        "pipeline.celery_app:celery_app",
        "beat",
        "--loglevel=info",
      ]
    volumes:
      - .:/app
      - ${HF_CACHE_DIR:-./.cache/huggingface}:/root/.cache/huggingface
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app:/app/news_scraper_project
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      TRANSLATION_MODEL: ${TRANSLATION_MODEL:-gpt-4.1-mini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      DEMO_EMBEDDING_MODEL: ${DEMO_EMBEDDING_MODEL:-demo-semantic-v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-BAAI/bge-m3}
      LOCAL_EMBEDDING_DEVICE: ${LOCAL_EMBEDDING_DEVICE:-cpu}
      LOCAL_EMBEDDING_BATCH_SIZE: ${LOCAL_EMBEDDING_BATCH_SIZE:-16}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HF_TOKEN:-}
      QDRANT_URL: http://qdrant:6333
      POSTGRES_DB: scrapy_db
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432

  crawl-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.crawl
    container_name: news_crawl_worker
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 4G
    mem_limit: 4g
    command:
      [
        "celery",
        "-A",
        "pipeline.celery_app:celery_app",
        "worker",
        "-Q",
        "crawl",
        "-c",
        "1",
        "--loglevel=info",
      ]
    volumes:
      - .:/app
      - ${HF_CACHE_DIR:-./.cache/huggingface}:/root/.cache/huggingface
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app:/app/news_scraper_project
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      TRANSLATION_MODEL: ${TRANSLATION_MODEL:-gpt-4.1-mini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      DEMO_EMBEDDING_MODEL: ${DEMO_EMBEDDING_MODEL:-demo-semantic-v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-BAAI/bge-m3}
      LOCAL_EMBEDDING_DEVICE: ${LOCAL_EMBEDDING_DEVICE:-cpu}
      LOCAL_EMBEDDING_BATCH_SIZE: ${LOCAL_EMBEDDING_BATCH_SIZE:-16}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HF_TOKEN:-}
      QDRANT_URL: http://qdrant:6333
      POSTGRES_DB: scrapy_db
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432

  translation-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    container_name: news_translation_worker
    depends_on:
      - redis
    command:
      [
        "celery",
        "-A",
        "pipeline.celery_app:celery_app",
        "worker",
        "-Q",
        "translate,default",
        "-c",
        "2",
        "--loglevel=info",
      ]
    volumes:
      - .:/app
      - ${HF_CACHE_DIR:-./.cache/huggingface}:/root/.cache/huggingface
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app:/app/news_scraper_project
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      TRANSLATION_MODEL: ${TRANSLATION_MODEL:-gpt-4.1-mini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      DEMO_EMBEDDING_MODEL: ${DEMO_EMBEDDING_MODEL:-demo-semantic-v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-BAAI/bge-m3}
      LOCAL_EMBEDDING_DEVICE: ${LOCAL_EMBEDDING_DEVICE:-cpu}
      LOCAL_EMBEDDING_BATCH_SIZE: ${LOCAL_EMBEDDING_BATCH_SIZE:-16}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HF_TOKEN:-}
      QDRANT_URL: http://qdrant:6333
      POSTGRES_DB: scrapy_db
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432

  embedding-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.embed
    container_name: news_embedding_worker
    depends_on:
      - redis
    command:
      [
        "celery",
        "-A",
        "pipeline.celery_app:celery_app",
        "worker",
        "-Q",
        "embed",
        "-c",
        "2",
        "--loglevel=info",
      ]
    volumes:
      - .:/app
      - ${HF_CACHE_DIR:-./.cache/huggingface}:/root/.cache/huggingface
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app:/app/news_scraper_project
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      TRANSLATION_MODEL: ${TRANSLATION_MODEL:-gpt-4.1-mini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      DEMO_EMBEDDING_MODEL: ${DEMO_EMBEDDING_MODEL:-demo-semantic-v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-BAAI/bge-m3}
      LOCAL_EMBEDDING_DEVICE: ${LOCAL_EMBEDDING_DEVICE:-cpu}
      LOCAL_EMBEDDING_BATCH_SIZE: ${LOCAL_EMBEDDING_BATCH_SIZE:-16}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HF_TOKEN:-}
      QDRANT_URL: http://qdrant:6333
      POSTGRES_DB: scrapy_db
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432

  monitor:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    container_name: news_celery_monitor
    depends_on:
      - redis
      - postgres
    command:
      [
        "python",
        "pipeline/monitor.py"
      ]
    volumes:
      - .:/app
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app:/app/news_scraper_project
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      POSTGRES_DB: scrapy_db
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432

  migration:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: news_migration
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python scripts/init_scheduler.py"
    volumes:
      - .:/app
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app:/app/news_scraper_project
      POSTGRES_DB: scrapy_db
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: news_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - .:/app
      - ${HF_CACHE_DIR:-./.cache/huggingface}:/root/.cache/huggingface
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app:/app/news_scraper_project
      POSTGRES_DB: scrapy_db
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      TRANSLATION_MODEL: ${TRANSLATION_MODEL:-gpt-4.1-mini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      DEMO_EMBEDDING_MODEL: ${DEMO_EMBEDDING_MODEL:-demo-semantic-v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-BAAI/bge-m3}
      LOCAL_EMBEDDING_DEVICE: ${LOCAL_EMBEDDING_DEVICE:-cpu}
      LOCAL_EMBEDDING_BATCH_SIZE: ${LOCAL_EMBEDDING_BATCH_SIZE:-16}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HF_TOKEN:-}
      QDRANT_URL: http://qdrant:6333
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRE_DAYS: ${JWT_EXPIRE_DAYS:-7}
      CHAT_MODEL: ${CHAT_MODEL:-deepseek-v4-flash}
      CHAT_THINK_MODEL: ${CHAT_THINK_MODEL:-deepseek-v4-pro}
      CHAT_RAG_TOP_K: ${CHAT_RAG_TOP_K:-5}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: news_frontend
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE: ""
    ports:
      - "13000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok) process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  web:
    image: nginx:1.27-alpine
    container_name: news_web
    depends_on:
      - api
      - frontend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "18080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  embedding-service:
    image: michaelf34/infinity:latest
    container_name: news_embedding_service
    command: v2 --model-id ${LOCAL_EMBEDDING_MODEL:-BAAI/bge-m3} --port 7997 --device ${LOCAL_EMBEDDING_DEVICE:-cpu}
    ports:
      - "7997:7997"
    volumes:
      - ${HF_CACHE_DIR:-./.cache/huggingface}:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7997/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:15
    container_name: scrapy_postgres
    environment:
      POSTGRES_DB: scrapy_db
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U your_user -d scrapy_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: scrapy_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: news_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: news_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  qdrant_data:
